version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 8
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Don't batch engine-affecting changes with patch updates.
      dev-runtime:
        applies-to:
          version-updates:
            - "minor"
            - "patch"
        patterns:
          - "@playwright/test"
          - "vitest"
          - "typescript"
          - "vite"
          - "husky"
          - "lint-staged"
          - "three"
          - "@types/*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 4
    labels:
      - "dependencies"
      - "automated"
